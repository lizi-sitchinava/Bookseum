<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Moodseum</title>

  <link rel="stylesheet" href="css/style.css">
  <script type="module" defer src="js/main.js"></script>

</head>


<body>

  <!------------- header --------------->
  <header>
    <nav>
      <span class="nav__logo">Moodseum</span>
      <div class="nav__links">
        <a href="index.html">Gallery</a>
        <a href="saved.html">My Board</a>
        <a href="login.html">Profile</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </nav>
  </header>


  <!------------ main ------------>
  <main>

    <!------- hero ------->
    <section class="hero-section">
      <h1>Your emotions, illustrated!</h1>
      <p>Pick a vibe, explore real museum art, and build your personal mood board.</p>

      <div class="mood-buttons">
        <button class="mood-btn" data-mood="sunshine flowers joy">😊 Happy</button>
        <button class="mood-btn" data-mood="rain solitude grey">😔 Melancholic</button>
        <button class="mood-btn" data-mood="shadow night dark">😮 Mysterious</button>
        <button class="mood-btn" data-mood="fire movement bold">⚡ Energetic</button>
      </div>
    </section>


    <!------- search ------->
    <section class="search-section">
      <form id="search-form">
        <input
          type="text"
          id="search-input"
          name="query"
          placeholder="search any word... (e.g. love, ocean, blue)"
          minlength="2"
        />

        <!------- era lifters ------->
        <select id="era-filter" name="era">
          <option value="">All Eras</option>
          <option value="ancient">Ancient</option>
          <option value="medieval">Medieval</option>
          <option value="renaissance">Renaissance</option>
          <option value="modern">Modern</option>
        </select>


        <button type="submit">Search</button>
      </form>
    </section>



    <!------- loading and error ------->
    <p id="loading-msg" hidden>Loading the mood...</p>

    <p id="error-msg" hidden></p>


    <!------- art results in grid ------>
    <section class="results-section" >
      <div id="results-grid"></div>
    </section>

  </main>


  <!--------- footer ---------->
  <footer>
    <p>Moodseum by Lizi Sitchinava © 2026</p>
  </footer>

</body>
</html>
